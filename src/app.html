<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="theme-color" content="#121212" />
		<link rel="icon" type="image/png" href="/icons/favicon-32.png" sizes="32x32" />
		<link rel="icon" type="image/png" href="/icons/icon-192.png" sizes="192x192" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<script>
		try {
			var s = JSON.parse(localStorage.getItem('groly_settings') || '{}');
			var t = s.theme;
			if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
			else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
		} catch(e) {}

		// Prevent pinch-to-zoom on all browsers (Firefox iOS ignores touch-action and user-scalable=no)
		document.addEventListener('touchmove', function(e) {
			if (e.touches.length > 1) e.preventDefault();
		}, { passive: false });
	</script>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
